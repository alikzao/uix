<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIX Playground</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e8ecf3;
      --muted: #9ba7ba;
      --accent: #4f8cff;
      --border: #2a3040;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #1b2130 0%, var(--bg) 55%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #4f8cff, #3a6de0);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>UIX Playground</h1>
    <p>Interactive sandbox with code on the left and live result on the right.</p>
    <a href="./playground/">Open Playground</a>
  </div>
</body>
</html>
