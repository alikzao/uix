<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIX Sandbox</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #151a24;
      --panel-2: #10141d;
      --text: #e8ecf3;
      --muted: #9aa6b9;
      --accent: #4f8cff;
      --border: #273044;
      --success: #2aa06d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #121826 0%, #101521 100%);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .topbar h1 {
      margin: 0 10px 0 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    select, button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, #4f8cff, #3c70e8);
      border: none;
    }
    button.secondary {
      background: #1d2433;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 56px);
    }
    .pane {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .pane-header {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .editor-wrap {
      flex: 1;
      background: #0a0f18;
      border-right: 1px solid var(--border);
    }
    textarea#editor {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #d8e2f1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      padding: 14px;
    }
    .preview-wrap {
      flex: 1;
      background: #0b111b;
    }
    iframe#preview {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .status {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .status.ok { color: #7ce2a9; }
    .status.err { color: #ff8f95; }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(300px, 45vh) minmax(300px, 55vh);
      }
      .editor-wrap {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>UIX Sandbox</h1>
    <div class="controls">
      <select id="exampleSelect"></select>
      <button class="primary" id="runBtn">Run</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </div>
    <div id="status" class="status">ready</div>
  </div>

  <div class="layout">
    <section class="pane">
      <div class="pane-header">Code</div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
    </section>
    <section class="pane">
      <div class="pane-header">Result</div>
      <div class="preview-wrap">
        <iframe id="preview" src="./runner.html" title="Sandbox result"></iframe>
      </div>
    </section>
  </div>

  <script type="module">
    const examples = {
      counter: `class Counter extends api.Component {
  constructor() {
    super(root, {});
    this.initState({ count: 0 });
  }

  increment() {
    this.setState({ count: this.state.count + 1 });
  }

  decrement() {
    this.setState({ count: this.state.count - 1 });
  }

  render() {
    return \`
      <div style="font-family: sans-serif; padding: 16px;">
        <h3>Counter Example</h3>
        <div style="display:flex; gap:8px; align-items:center;">
          <button data-click="decrement">-</button>
          <strong style="min-width:30px; text-align:center;">\${this.state.count}</strong>
          <button data-click="increment">+</button>
        </div>
      </div>
    \`;
  }
}

new Counter();`,
      popup: `class DemoPopup extends api.PopupComponent {
  constructor() {
    super(null, { size: "small", onCloseRequest: false });
  }

  content() {
    return \`
      <div class="popup-sub-content">
        <label style="color:#000; font-weight:700; grid-column:1 / 4;">UIX Popup</label>
        <input type="text" placeholder="Try typing here..." />
      </div>
    \`;
  }
}

const wrap = document.createElement("div");
wrap.style.padding = "16px";
wrap.innerHTML = '<h3 style="font-family:sans-serif;">Popup Example</h3><button id="openPopup">Open popup</button>';
root.appendChild(wrap);

const popup = new DemoPopup();
document.getElementById("openPopup").addEventListener("click", () => popup.open());`
    };

    const labels = {
      counter: "Component Counter",
      popup: "Popup Component"
    };

    const editor = document.getElementById("editor");
    const select = document.getElementById("exampleSelect");
    const runBtn = document.getElementById("runBtn");
    const resetBtn = document.getElementById("resetBtn");
    const frame = document.getElementById("preview");
    const status = document.getElementById("status");

    let currentKey = "counter";

    for (const key of Object.keys(examples)) {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = labels[key] || key;
      select.appendChild(opt);
    }

    const setStatus = (text, mode = "") => {
      status.textContent = text;
      status.className = `status ${mode}`.trim();
    };

    const run = () => {
      frame.contentWindow.postMessage(
        { type: "uix:run", code: editor.value },
        "*"
      );
      setStatus("running...");
    };

    select.value = currentKey;
    editor.value = examples[currentKey];

    select.addEventListener("change", () => {
      currentKey = select.value;
      editor.value = examples[currentKey];
      run();
    });

    runBtn.addEventListener("click", run);
    resetBtn.addEventListener("click", () => {
      editor.value = examples[currentKey];
      run();
    });

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "uix:status") return;
      if (event.data.ok) {
        setStatus("ok", "ok");
      } else {
        setStatus(event.data.error || "runtime error", "err");
      }
    });

    frame.addEventListener("load", run);
  </script>
</body>
</html>
