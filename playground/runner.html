<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIX Runner</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: #ffffff; color: #111; }
    #root { min-height: 100vh; }
    #console {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      max-height: 26vh;
      overflow: auto;
      border-radius: 8px;
      background: rgba(18, 24, 35, 0.94);
      color: #d6e2f7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      padding: 8px 10px;
      box-sizing: border-box;
      display: none;
      white-space: pre-wrap;
      z-index: 10000;
    }
    #console.visible { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <pre id="console"></pre>

  <script type="module">
    import {
      Component,
      ExtendedComponent,
      PopupComponent,
      TreeManager,
      Emitter,
      emitter,
      socketService
    } from "../src/index.js";

    const root = document.getElementById("root");
    const consoleBox = document.getElementById("console");
    const parentOrigin = (() => {
      try {
        return new URL(document.referrer).origin;
      } catch (_error) {
        return window.location.origin;
      }
    })();
    let currentRunId = "";

    const api = {
      Component,
      ExtendedComponent,
      PopupComponent,
      TreeManager,
      Emitter,
      emitter,
      socketService
    };

    const ensureSandboxSocket = () => {
      if (!socketService.socket) {
        socketService.socket = {
          onAny() {},
          on() {},
          off() {},
          emit() {}
        };
      }
    };

    const postToParent = (payload) => {
      window.parent.postMessage(payload, parentOrigin);
    };

    const write = (msg) => {
      postToParent({ type: "uix:log", runId: currentRunId, message: String(msg) });
      consoleBox.classList.add("visible");
      consoleBox.textContent += `${msg}\n`;
    };

    const clearRuntimeState = () => {
      root.innerHTML = "";
      consoleBox.textContent = "";
      consoleBox.classList.remove("visible");
      const popups = document.querySelectorAll(".popup");
      popups.forEach((node) => node.remove());
    };

    const blockNetworkApis = () => {
      const previous = {
        fetch: window.fetch,
        XMLHttpRequest: window.XMLHttpRequest,
        WebSocket: window.WebSocket,
        EventSource: window.EventSource,
        open: window.open
      };

      const blocked = () => {
        throw new Error("Network APIs are disabled in sandbox.");
      };

      window.fetch = blocked;
      window.XMLHttpRequest = class {
        constructor() {
          throw new Error("XMLHttpRequest is disabled in sandbox.");
        }
      };
      window.WebSocket = class {
        constructor() {
          throw new Error("WebSocket is disabled in sandbox.");
        }
      };
      window.EventSource = class {
        constructor() {
          throw new Error("EventSource is disabled in sandbox.");
        }
      };
      window.open = blocked;

      return () => {
        window.fetch = previous.fetch;
        window.XMLHttpRequest = previous.XMLHttpRequest;
        window.WebSocket = previous.WebSocket;
        window.EventSource = previous.EventSource;
        window.open = previous.open;
      };
    };

    const runUserCode = async (code) => {
      clearRuntimeState();
      ensureSandboxSocket();
      const restoreApis = blockNetworkApis();
      try {
        const wrapped = new Function("api", "root", "log", code);
        await wrapped(api, root, write);
      } finally {
        restoreApis();
      }
    };

    window.addEventListener("message", async (event) => {
      if (event.source !== window.parent) return;
      if (event.origin !== parentOrigin) return;
      if (!event.data || event.data.type !== "uix:run") return;
      currentRunId = event.data.runId || "";
      try {
        await runUserCode(event.data.code || "");
        postToParent({ type: "uix:status", runId: currentRunId, ok: true });
      } catch (error) {
        const message = error && error.stack ? error.stack : String(error);
        write(message);
        postToParent({ type: "uix:status", runId: currentRunId, ok: false, error: String(error.message || error) });
      }
    });
  </script>
</body>
</html>
