<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIX Runner</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: #ffffff; color: #111; }
    #root { min-height: 100vh; }
    #console {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      max-height: 26vh;
      overflow: auto;
      border-radius: 8px;
      background: rgba(18, 24, 35, 0.94);
      color: #d6e2f7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      padding: 8px 10px;
      box-sizing: border-box;
      display: none;
      white-space: pre-wrap;
      z-index: 10000;
    }
    #console.visible { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <pre id="console"></pre>

  <script type="module">
    import {
      Component,
      ExtendedComponent,
      PopupComponent,
      TreeManager,
      Emitter,
      emitter,
      socketService
    } from "../src/index.js";

    const root = document.getElementById("root");
    const consoleBox = document.getElementById("console");

    const api = {
      Component,
      ExtendedComponent,
      PopupComponent,
      TreeManager,
      Emitter,
      emitter,
      socketService
    };

    const ensureSandboxSocket = () => {
      if (!socketService.socket) {
        socketService.socket = {
          onAny() {},
          on() {},
          off() {},
          emit() {}
        };
      }
    };

    const write = (msg) => {
      consoleBox.classList.add("visible");
      consoleBox.textContent += `${msg}\n`;
    };

    const clearRuntimeState = () => {
      root.innerHTML = "";
      consoleBox.textContent = "";
      consoleBox.classList.remove("visible");
      const popups = document.querySelectorAll(".popup");
      popups.forEach((node) => node.remove());
    };

    const runUserCode = async (code) => {
      clearRuntimeState();
      ensureSandboxSocket();
      const wrapped = new Function("api", "root", "log", code);
      await wrapped(api, root, write);
    };

    window.addEventListener("message", async (event) => {
      if (!event.data || event.data.type !== "uix:run") return;
      try {
        await runUserCode(event.data.code || "");
        window.parent.postMessage({ type: "uix:status", ok: true }, "*");
      } catch (error) {
        const message = error && error.stack ? error.stack : String(error);
        write(message);
        window.parent.postMessage({ type: "uix:status", ok: false, error: String(error.message || error) }, "*");
      }
    });
  </script>
</body>
</html>
